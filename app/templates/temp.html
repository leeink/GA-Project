<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글로벌냉동식품 보고서 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 700px; margin: auto; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .row label { width: 120px; font-weight: bold; }
        select { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ddd; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background-color: #3498db; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 글로벌냉동식품 보고서 생성</h2>
        
        <div class="row">
            <label>연도 범위</label>
            <select id="start_year">
                <option value="2015">2015년</option>
                <option value="2025" selected>2025년</option>
            </select>
            <span>~</span>
            <select id="end_year">
                <option value="2015" selected>2015년</option>
                <option value="2025">2025년</option>
            </select>
        </div>

        <div class="row">
            <label>월 범위</label>
            <select id="start_month">
                <option value="1" selected>1월</option>
                <option value="4">4월</option>
            </select>
            <span>~</span>
            <select id="end_month">
                <option value="4" selected>4월</option>
                <option value="12">12월</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="generateReport('custom')">📅 선택 범위 통합 보고서 생성 (사업+손익)</button>
        </div>
    </div>

    <script>
        async function generateReport(type) {
            const params = {
                start_year: document.getElementById('start_year').value,
                end_year: document.getElementById('end_year').value,
                start_month: document.getElementById('start_month').value,
                end_month: document.getElementById('end_month').value
            };
            
            const response = await fetch('/total/report/custom', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
            
            if (response.ok) alert("범위 보고서 생성 성공!");
            else alert("생성 실패!");
        }
    </script>
</body>
</html>
